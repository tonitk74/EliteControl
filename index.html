<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Suito Controller</title>

    <style>
        * {
			box-sizing: border-box;
		}
		
		body {
            font-family: Calibri, sans-serif;
            max-width: 420px;
            margin: auto;
            padding: 5px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
        }
		
		.bigPowerButton {
			font-size: 35px;
			font-weight: bold;
			width: 180px;
			height: 65px;
		}

        #log {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            background: #f5f5f5;
            font-family: Consolas, monospace;
        }
    </style>
</head>
<body>

    <p>Elite Suito FTMS Controller<p>
	<button id="power0Btn" class="bigPowerButton" disabled>
		0 W
	</button>
	<button id="power130Btn" class="bigPowerButton" disabled>
		130 W
	</button>
	<button id="power165Btn" class="bigPowerButton" disabled>
		165 W
	</button>
	<button id="power200Btn" class="bigPowerButton" disabled>
		200 W
	</button>

	<button id="powerDownBtn" class="bigPowerButton" style="width: 315px;" disabled>
		-
	</button>
	<button id="powerUpBtn" class="bigPowerButton" style="width: 315px;" disabled>
		 +
	</button>
    <button id="connectBtn">
        Yhdistä traineriin
    </button>

    <button id="requestControlBtn" disabled>
        Request Control
    </button>
	
	<button id="releaseBtn" disabled>
		Release Trainer
	</button>

	<button id="startBtn" disabled>
		Start Workout
	</button>

    <div id="log"></div>



    <script src="EliteControl.js"></script>

</body>
</html>
